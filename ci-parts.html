<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配件查詢與訂購清單｜CLINICO 電子耳事業處</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --navy:#1F2A44; --gold:#B08D3F; --green:#2E7D5B; --red:#B3392B; --amber:#B45309;
    --bg:#F2F0EA; --card:#FFFFFF; --ink:#26272B; --mute:#6E6E68; --line:#E3E0D6;
    --ok-bg:#EAF4EF; --no-bg:#FBEDEA; --warn-bg:#FBF3E4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh; display:flex; justify-content:center;}
  .app{width:100%; max-width:430px; min-height:100vh; display:flex; flex-direction:column; padding-bottom:64px;}
  header{background:var(--navy); color:#fff; padding:18px 20px 14px;}
  header .brand{font-size:12px; letter-spacing:.14em; color:var(--gold); font-weight:700;}
  header h1{font-size:20px; font-weight:700; margin-top:4px;}
  header .sub{font-size:12px; color:#B9C2D6; margin-top:2px;}
  .demo{background:#F4E8CC; color:#6B5218; font-size:12px; padding:8px 20px; line-height:1.5;}
  .steps{display:flex; gap:6px; padding:14px 20px 4px;}
  .steps span{flex:1; text-align:center; font-size:12px; color:var(--mute); padding:6px 0; border-bottom:3px solid var(--line);}
  .steps span.on{color:var(--navy); font-weight:700; border-bottom-color:var(--gold);}
  main{flex:1; padding:14px 20px 28px;}
  .q{font-size:17px; font-weight:700; margin:10px 0 12px;}
  .earTag{display:inline-block; background:var(--navy); color:#fff; font-size:12px; font-weight:700; border-radius:6px; padding:3px 10px; margin-right:8px; vertical-align:2px;}
  .chipRow{margin-bottom:12px;}
  .chip{display:inline-flex; align-items:center; gap:6px; background:var(--card); border:1px solid var(--line); border-radius:999px; padding:6px 12px; font-size:13px; color:var(--navy); font-weight:700; margin:0 6px 6px 0;}
  .chip.act{background:var(--navy);border-color:var(--navy);color:#fff;}
  .chip.dim2{opacity:.4;}
  .earNow{display:block;background:var(--gold);color:#fff;font-size:13px;font-weight:700;border-radius:8px;padding:9px 12px;margin:2px 0 10px;line-height:1.4;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .opt{background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:16px 14px; text-align:left; cursor:pointer; font-family:inherit; transition:border-color .15s, transform .05s;}
  .opt:active{transform:scale(.985);}
  .opt:hover{border-color:var(--navy);}
  .opt:focus-visible{outline:3px solid var(--gold); outline-offset:2px;}
  .opt .name{font-size:15.5px; font-weight:700; color:var(--navy);}
  .opt .desc{font-size:12px; color:var(--mute); margin-top:4px; line-height:1.45;}
  .opt.dim .name{color:var(--mute);}
  .list .opt{width:100%; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .list .opt .arrow{color:var(--gold); font-size:18px; flex:none;}
  .meta{font-size:12px; color:var(--mute); margin-top:4px; line-height:1.5;}
  .meta b{color:var(--gold); font-weight:700;}
  .tag{display:inline-block; font-size:10.5px; font-weight:700; border-radius:4px; padding:1px 6px; margin-right:4px;}
  .tag.y{background:var(--ok-bg); color:var(--green);}
  .tag.n{background:var(--no-bg); color:var(--red);}
  .pimg{width:54px;height:54px;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:8px;flex:none;}
  .vimg{width:104px;height:104px;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:10px;margin:10px auto 0;display:block;}
  .back{border:none; background:none; color:var(--navy); font-size:14px; font-weight:700; cursor:pointer; padding:6px 0; margin-bottom:6px; font-family:inherit;}
  .verdict{border-radius:16px; padding:18px 16px 16px; text-align:center; margin-top:14px;}
  .verdict.ok{background:var(--ok-bg); border:1.5px solid var(--green);}
  .verdict.no{background:var(--no-bg); border:1.5px solid var(--red);}
  .verdict.warn{background:var(--warn-bg); border:1.5px solid var(--amber);}
  .badge{width:48px; height:48px; border-radius:50%; margin:0 auto 8px; display:flex; align-items:center; justify-content:center; font-size:26px; color:#fff; font-weight:700;}
  .ok .badge{background:var(--green);} .no .badge{background:var(--red);} .warn .badge{background:var(--amber);}
  .verdict h2{font-size:18px; font-weight:800;}
  .ok h2{color:var(--green);} .no h2{color:var(--red);} .warn h2{color:var(--amber);}
  .pair{font-size:13.5px; margin-top:6px; line-height:1.6;}
  .pair b{color:var(--navy);}
  .panel{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-top:12px; text-align:left;}
  .panel .label{font-size:11.5px; letter-spacing:.1em; color:var(--gold); font-weight:700; margin-bottom:6px;}
  .panel p{font-size:13.5px; line-height:1.65;}
  .gchip,.cchip{display:inline-block; border:1.5px solid var(--line); background:#fff; border-radius:8px; padding:6px 10px; margin:0 6px 6px 0; font-size:12.5px; font-weight:700; color:var(--ink); cursor:pointer; font-family:inherit;}
  .gchip.sel{border-color:var(--navy); background:var(--navy); color:#fff;}
  .cchip{font-weight:400;}
  .cchip b{font-weight:700; color:var(--navy);}
  .cchip.sel{border-color:var(--green); background:var(--ok-bg);}
  .qtyrow{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:4px;}
  .qbtn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--navy);background:#fff;color:var(--navy);font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;}
  .qnum{font-size:16px;font-weight:800;min-width:34px;text-align:center;}
  .selline{display:flex; justify-content:space-between; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .selline .code{font-size:14px; font-weight:800; color:var(--navy);}
  .selline .price{font-size:15px; font-weight:800; color:var(--navy); white-space:nowrap;}
  .addbtn{width:100%; margin-top:12px; border-radius:12px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; border:none; background:var(--navy); color:#fff;}
  .addbtn:disabled{background:#9AA3B5; cursor:default;}
  .actions{display:grid; gap:10px; margin-top:18px;}
  .btn{border-radius:12px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; border:1.5px solid var(--navy);}
  .btn.primary{background:var(--navy); color:#fff;}
  .btn.ghost{background:transparent; color:var(--navy);}
  .btn.gold{background:var(--gold); border-color:var(--gold); color:#fff;}
  .btn.danger{border-color:var(--red); color:var(--red); background:transparent;}
  .empty{background:var(--card); border:1px dashed var(--line); border-radius:12px; padding:20px 16px; font-size:13.5px; color:var(--mute); text-align:center; line-height:1.7;}
  .wtag{display:inline-block;background:#EDE7D8;color:#6B5218;font-size:11px;font-weight:700;border-radius:5px;padding:2px 7px;margin-left:6px;vertical-align:1px;}
  .crow{display:flex; gap:10px; align-items:flex-start;}
  .crow .cimg{width:52px;height:52px;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:8px;flex:none;margin-top:2px;}
  .crow .cbody{flex:1;}
  #cartbar{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:var(--navy); color:#fff; display:none; align-items:center; justify-content:space-between; padding:12px 18px; cursor:pointer; z-index:9;}
  #cartbar .cinfo{font-size:14px; font-weight:700;}
  #cartbar .cinfo small{display:block; font-size:11px; color:#B9C2D6; font-weight:400;}
  #cartbar .go{background:var(--gold); border-radius:8px; padding:8px 14px; font-size:13.5px; font-weight:700;}
  .crow{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px;}
  .crow .t{display:flex; justify-content:space-between; gap:8px; font-size:13.5px; font-weight:700; color:var(--navy);}
  .crow .m{font-size:12px; color:var(--mute); margin-top:3px; line-height:1.5;}
  .crow .b{display:flex; justify-content:space-between; align-items:center; margin-top:8px;}
  .crow .sub{font-size:14px; font-weight:800; color:var(--navy);}
  .del{border:none;background:none;color:var(--red);font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;padding:4px;}
  .total{display:flex; justify-content:space-between; align-items:baseline; background:var(--navy); color:#fff; border-radius:12px; padding:14px 16px; margin-top:6px;}
  .total .tt{font-size:13px; color:#B9C2D6;}
  .total .tv{font-size:19px; font-weight:800; color:var(--gold);}
  footer{padding:12px 20px 20px; font-size:11px; color:var(--mute); text-align:center; line-height:1.6;}
  .hidden{display:none;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">CLINICO 科林集團</div>
    <h1>配件查詢與訂購清單</h1>
    <div class="sub">電子耳事業處　防呆驗證 → 加入清單 → 匯出打單</div>
  </header>
  <div class="demo"><strong>資料來源</strong>：CI／Baha 目錄圖鑑 2024.11 版。價格為型錄標價，實際金額以報價單為準；Kanso 3 配件待原廠公佈。</div>
  <div class="steps">
    <span id="st1" class="on">1 選主機</span><span id="st2">2 選配件</span><span id="st3">3 加入清單</span><span id="st4">4 匯出</span>
  </div>
  <main>
    <section id="s1L">
      <div class="q"><span class="earTag">左耳</span>患者左耳的聲音處理器？</div>
      <div class="grid" id="gridL"></div>
    </section>
    <section id="s1R" class="hidden">
      <button class="back" onclick="show(['s1L'])">‹ 重選左耳</button>
      <div class="chipRow" id="chipL"></div>
      <div class="q"><span class="earTag">右耳</span>患者右耳的聲音處理器？</div>
      <div class="grid" id="gridR"></div>
    </section>
    <section id="s2ear" class="hidden">
      <div class="chipRow" id="chipEars0"></div>
      <div class="q">這個配件要為哪一耳訂購？</div>
      <div class="list" id="earChoiceList"></div>
    </section>
    <section id="s2a" class="hidden">
      <button class="back" id="backEar">‹ 返回</button>
      <div class="chipRow" id="chipEars"></div>
      <div class="q">要訂購哪一類配件？</div>
      <div class="list" id="catList"></div>
    </section>
    <section id="s2b" class="hidden">
      <button class="back" onclick="show(['s2a'])">‹ 返回配件類別</button>
      <div class="chipRow" id="chipEars2"></div>
      <div class="q" id="itemQ">選擇品項</div>
      <div class="list" id="itemList"></div>
    </section>
    <section id="s3" class="hidden">
      <button class="back" onclick="show(['s2b'])">‹ 返回品項清單</button>
      <div id="verdicts"></div>
      <div class="actions">
        <button class="btn primary" id="again">查詢其他配件（同一位患者）</button>
        <button class="btn ghost" id="restart">重新開始</button>
      </div>
    </section>
    <section id="s4" class="hidden">
      <button class="back" onclick="backFromCart()">‹ 返回繼續查詢</button>
      <div class="q">訂購清單</div>
      <div id="cartRows"></div>
      <div class="total" id="cartTotal"></div>
      <div class="actions">
        <button class="btn gold" onclick="exportOrder()">匯出 Excel（打單用）</button>
        <button class="btn ghost" onclick="printList()">列印圖文版（可存 PDF）</button>
        <button class="btn ghost" onclick="backFromCart()">繼續查詢配件</button>
        <button class="btn danger" onclick="clearCart()">清空清單</button>
      </div>
    </section>
  </main>
  <footer>內部工具・僅供 CLINICO 電子耳事業處使用<br>資料版本：2024.11 型錄 v2.4（選購耳別提示）・維護：Stella</footer>
</div>
<div id="cartbar" onclick="openCart()">
  <div class="cinfo"><span id="cbCount"></span><small>點擊查看清單並匯出</small></div>
  <div class="go">查看清單 ›</div>
</div>

const PROCESSORS = [
  {id:"n8", name:"Nucleus 8", desc:"CP1110 耳掛式"},
  {id:"n7", name:"Nucleus 7", desc:"CP1000 耳掛式"},
  {id:"k2", name:"Kanso 2", desc:"CP1150 鈕扣式"},
  {id:"k3", name:"Kanso 3", desc:"鈕扣式・9 月上市"},
  {id:"n6", name:"Nucleus 6", desc:"CP910 停售/耗材供應"},
  {id:"n5", name:"Nucleus 5", desc:"CP810 停售/耗材供應"},
];
const NONE = {id:"none", name:"未植入／無", desc:"此耳無處理器"};
const CATEGORIES = [
  {id:"coil", name:"線圈・磁鐵・外觀", desc:"線圈導線、磁鐵、保護罩、外殼"},
  {id:"power", name:"電池與充電", desc:"充電電池、電池座、充電器"},
  {id:"wear", name:"耳勾與配戴固定", desc:"耳勾、頭帶、固定夾"},
  {id:"aqua", name:"防水配件", desc:"Aqua+ 系列、防水線圈"},
  {id:"remote", name:"遙控・無線・串流", desc:"遙控器、Mini Mic、FM"},
  {id:"common", name:"通用耗材與保養", desc:"各代主機皆適用"},
];

let earL=null, earR=null, earPick=null, cat=null;
let CUR=[], SEL=[], CART=[];
const $=id=>document.getElementById(id);
const fmt=n=>"NT$ "+n.toLocaleString("zh-TW");
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
const ALL=["s1L","s1R","s2ear","s2a","s2b","s3","s4"];
function show(ids){ALL.forEach(x=>$(x).classList.toggle("hidden",!ids.includes(x)));}
function setStep(n){["st1","st2","st3","st4"].forEach((x,i)=>$(x).classList.toggle("on",i===n-1));}
function getItems(pid,cid){ if(cid==="common") return COMMON; return (DATA[pid]&&DATA[pid][cid])?DATA[pid][cid]:[]; }
function codeCount(it){ if(it.code) return 1; let n=0; (it.var||[]).forEach(v=>n+=v.c.length); return n; }
function IMGkey(pid,name){ return IMGS[((cat&&cat.id==="common")?"common":pid)+"|"+name]||""; }

const earChips=()=>{
  const bothDiff=earL&&earR&&earL.id!=="none"&&earR.id!=="none"&&earL.id!==earR.id;
  const cls=s=>{
    if(!earPick||!bothDiff) return "";
    if(earPick==="BOTH") return " act";
    if(earPick==="L") return s==="L"?" act":" dim2";
    if(earPick==="R") return s==="R"?" act":" dim2";
    return ""; };
  let h="";
  if(earL&&earL.id!=="none") h+=`<span class="chip${cls('L')}">左耳：${earL.name}</span>`;
  if(earR&&earR.id!=="none") h+=`<span class="chip${cls('R')}">右耳：${earR.name}</span>`;
  h+=`<span class="chip"><button onclick="resetAll()" style="border:none;background:none;cursor:pointer;font-family:inherit;font-size:12.5px;color:var(--navy);font-weight:700;">重選主機 ✕</button></span>`;
  let ban="";
  if(bothDiff&&earPick==="L") ban=`<div class="earNow">▶ 目前選購耳別：左耳（${earL.name}）— 僅顯示 ${earL.name} 適用配件</div>`;
  else if(bothDiff&&earPick==="R") ban=`<div class="earNow">▶ 目前選購耳別：右耳（${earR.name}）— 僅顯示 ${earR.name} 適用配件</div>`;
  else if(bothDiff&&earPick==="BOTH") ban=`<div class="earNow">▶ 雙耳都要：僅列雙耳皆適用品項，左右耳各自選料號</div>`;
  else if(earPick==="BOTH_SAME") ban=`<div class="earNow">▶ 雙耳選購（同機型 ${earL.name}）</div>`;
  return `<div>${h}</div>${ban}`;
};
function procButtons(target){
  return [...PROCESSORS,NONE].map(p=>
    `<button class="opt ${p.id==='none'?'dim':''}" onclick="${target}('${p.id}')">
       <div class="name">${p.name}</div><div class="desc">${p.desc}</div></button>`).join("");
}
$("gridL").innerHTML=procButtons("pickL");
function pickL(id){
  earL=id==="none"?{...NONE}:PROCESSORS.find(p=>p.id===id);
  $("chipL").innerHTML=`<span class="chip">左耳：${earL.name}</span>`;
  $("gridR").innerHTML=procButtons("pickR");
  show(["s1R"]);
}
function pickR(id){
  earR=id==="none"?{...NONE}:PROCESSORS.find(p=>p.id===id);
  if(earL.id==="none"&&earR.id==="none"){alert("左右耳皆選「未植入」，請至少選擇一耳的處理器。");return;}
  setStep(2);
  const both=earL.id!=="none"&&earR.id!=="none";
  if(both&&earL.id!==earR.id){
    earPick=null;
    $("chipEars0").innerHTML=earChips();
    $("earChoiceList").innerHTML=[
      {k:"L",t:`左耳（${earL.name}）`,d:"僅為左耳訂購"},
      {k:"R",t:`右耳（${earR.name}）`,d:"僅為右耳訂購"},
      {k:"BOTH",t:"雙耳都要",d:"僅顯示雙耳皆適用的品項，左右耳分別選料號加入清單"},
    ].map(o=>`<button class="opt" onclick="pickEar('${o.k}')">
        <span><span class="name">${o.t}</span><div class="desc">${o.d}</div></span>
        <span class="arrow">›</span></button>`).join("");
    show(["s2ear"]);
  }else{
    earPick=both?"BOTH_SAME":(earL.id!=="none"?"L":"R");
    gotoCats(false);
  }
}
function pickEar(k){earPick=k;gotoCats(true);}
function gotoCats(showBack){
  $("backEar").style.display=showBack?"":"none";
  $("chipEars").innerHTML=earChips();
  $("catList").innerHTML=CATEGORIES.map(c=>
    `<button class="opt" onclick="pickCat('${c.id}')">
       <span><span class="name">${c.name}</span><div class="desc">${c.desc}</div></span>
       <span class="arrow">›</span></button>`).join("");
  show(["s2a"]);
}
$("backEar").onclick=()=>show(["s2ear"]);
function activeProcs(){
  if(earPick==="BOTH") return [["左耳",earL],["右耳",earR]];
  if(earPick==="BOTH_SAME") return [["雙耳（同機型）",earL]];
  if(earPick==="L") return [[earR&&earR.id!=="none"?"左耳":"",earL]];
  return [[earL&&earL.id!=="none"?"右耳":"",earR]];
}
function pickCat(id){
  cat=CATEGORIES.find(c=>c.id===id);
  $("chipEars2").innerHTML=earChips();
  $("itemQ").textContent=cat.name+"：選擇品項";
  const procs=activeProcs();
  let names=[];
  if(earPick==="BOTH"&&cat.id!=="common"){
    const setR=new Set(getItems(procs[1][1].id,cat.id).map(it=>it.n));
    names=getItems(procs[0][1].id,cat.id).map(it=>it.n).filter(n=>setR.has(n));
  }else{
    let seen={};
    procs.forEach(pr=>getItems(pr[1].id,cat.id).forEach(it=>{if(!seen[it.n]){seen[it.n]=1;names.push(it.n);}}));
  }
  if(names.length===0){
    const isK3=procs.some(pr=>pr[1].id==="k3");
    $("itemList").innerHTML=`<div class="empty">${isK3?"Kanso 3 配件料號與價格待原廠公佈（9 月上市），確認後即更新。":(earPick==="BOTH"?"此類別沒有雙耳皆適用的同名品項。單耳專屬配件請返回，改選「左耳」或「右耳」單獨查詢。":"型錄中此主機無此類別品項。")}</div>`;
    show(["s2b"]);return;
  }
  $("itemList").innerHTML=names.map(n=>{
    let firstIt=getItems(procs[0][1].id,cat.id).find(x=>x.n===n), tags="", liImg="";
    if(cat.id==="common"){liImg=IMGS["common|"+n]||"";}
    else{for(const pr of procs){const t=IMGS[pr[1].id+"|"+n];if(t){liImg=t;break;}}}
    const cc=firstIt?codeCount(firstIt):0;
    const meta=firstIt?`標準價 ${fmt(firstIt.p)}／${firstIt.u}　<b>${cc>1?("共 "+cc+" 個料號"):firstIt.code}</b>`:"";
    return `<button class="opt" onclick="pickItem('${encodeURIComponent(n)}')">
       ${liImg?'<img class="pimg" src="'+liImg+'" alt="">':''}<span><span class="name" style="font-size:14.5px">${n}</span>
       <div class="meta">${tags?tags+"<br>":""}${meta}</div></span>
       <span class="arrow">›</span></button>`;
  }).join("");
  show(["s2b"]);
}
function pickItem(enc){
  const name=decodeURIComponent(enc);
  const procs=activeProcs();
  CUR=[]; SEL=[];
  if(cat.id==="common"){
    const it=COMMON.find(x=>x.n===name);
    CUR.push({ear:"通用",proc:procs[0][1],it,name});
  }else{
    procs.forEach(pr=>{
      const it=getItems(pr[1].id,cat.id).find(x=>x.n===name);
      CUR.push({ear:pr[0]||"—",proc:pr[1],it,name});
    });
  }
  CUR.forEach((c,i)=>{
    const s={gi:0,code:null,sub:"",qty:1};
    if(c.it&&c.it.code){s.code=c.it.code;}
    else if(c.it&&c.it.var&&c.it.var.length===1&&c.it.var[0].c.length===1){s.code=c.it.var[0].c[0][0];s.sub=c.it.var[0].c[0][1];}
    SEL.push(s);
  });
  renderVerdicts();
  setStep(3); show(["s3"]);
}
function renderVerdicts(){
  $("verdicts").innerHTML=CUR.map((c,i)=>{
    if(!c.it){
      return `<div class="verdict no"><div class="badge">✕</div>
        <h2>${c.ear}：此主機無此品項</h2>
        <div class="pair">主機 <b>${c.proc.name}</b> × 配件 <b>${esc(c.name)}</b></div>
        <div class="panel"><div class="label">注意事項</div><p>2024.11 型錄中無 ${c.proc.name} 適用之「${esc(c.name)}」，請改查 ${c.proc.name} 的專屬品項，或洽專員確認。</p></div></div>`;
    }
    const it=c.it, s=it.s==="warn"?"warn":"ok";
    const title=s==="warn"?"可開單，請先確認注意事項":"相容，可開單";
    const img=IMGkey(c.proc.id,it.n);
    let selHTML="";
    if(it.var){
      const groups=it.var.length>1?`<div>${it.var.map((v,gi)=>`<button class="gchip ${SEL[i].gi===gi?'sel':''}" onclick="selGroup(${i},${gi})">${esc(v.g)}</button>`).join("")}</div>`:"";
      selHTML=`<div class="panel"><div class="label">選擇料號（共 ${codeCount(it)} 個）</div>${groups}<div id="codes_${i}">${codeChips(i)}</div></div>`;
    }
    return `<div class="verdict ${s}"><div class="badge">${s==="warn"?"!":"✓"}</div>
      <h2>${c.ear&&c.ear!=="—"?c.ear+"：":""}${title}</h2>
      <div class="pair">主機 <b>${c.proc.name}</b> × 配件 <b>${esc(it.n)}</b></div>
      ${img?'<img class="vimg" src="'+img+'" alt="產品圖">':''}
      ${selHTML}
      <div class="panel"><div class="label">開單資訊</div>
        <div class="selline"><span class="code" id="selcode_${i}">${SEL[i].code?esc(SEL[i].code)+(SEL[i].sub?"（"+esc(SEL[i].sub)+"）":""):"請先點選料號"}</span>
        <span class="price">${fmt(it.p)}／${esc(it.u)}${it.w?'<span class="wtag">保固 '+esc(it.w)+'</span>':''}</span></div>
        <div class="qtyrow"><span style="font-size:13px;color:var(--mute)">數量</span>
          <span><button class="qbtn" onclick="chQty(${i},-1)">−</button>
          <span class="qnum" id="qty_${i}">1</span>
          <button class="qbtn" onclick="chQty(${i},1)">＋</button></span></div>
        <button class="addbtn" id="add_${i}" onclick="addCart(${i})">加入訂購清單</button>
      </div>
      ${it.note?`<div class="panel"><div class="label">注意事項</div><p>${esc(it.note)}</p></div>`:""}
    </div>`;
  }).join("");
}
function codeChips(i){
  const it=CUR[i].it, v=it.var[SEL[i].gi];
  return v.c.map(([code,sub],ci)=>
    `<button class="cchip ${SEL[i].code===code?'sel':''}" onclick="selCode(${i},${ci})">${sub?esc(sub)+" ":""}<b>${esc(code)}</b></button>`).join("");
}
function selGroup(i,gi){ SEL[i].gi=gi; SEL[i].code=null; SEL[i].sub="";
  if(CUR[i].it.var[gi].c.length===1){SEL[i].code=CUR[i].it.var[gi].c[0][0];SEL[i].sub=CUR[i].it.var[gi].c[0][1];}
  renderVerdicts(); syncQty(i); }
function selCode(i,ci){ const [code,sub]=CUR[i].it.var[SEL[i].gi].c[ci]; SEL[i].code=code; SEL[i].sub=sub;
  $("codes_"+i).innerHTML=codeChips(i);
  $("selcode_"+i).textContent=code+(sub?"（"+sub+"）":""); }
function syncQty(i){ $("qty_"+i).textContent=SEL[i].qty; }
function chQty(i,d){ SEL[i].qty=Math.max(1,SEL[i].qty+d); syncQty(i); }
function addCart(i){
  const c=CUR[i], s=SEL[i];
  if(!s.code){alert("請先點選一個料號。");return;}
  const key=s.code+"|"+c.ear;
  const ex=CART.find(r=>r.key===key);
  if(ex){ex.qty+=s.qty;}
  else{const ik=((cat&&cat.id==="common")?"common":c.proc.id)+"|"+c.it.n;CART.push({key,proc:c.proc.name,ear:c.ear,item:c.it.n,code:s.code,sub:s.sub,price:c.it.p,unit:c.it.u,qty:s.qty,w:c.it.w||"",ik});}
  const b=$("add_"+i); b.textContent="已加入 ✓"; b.disabled=true;
  setTimeout(()=>{b.textContent="加入訂購清單"; b.disabled=false;},1200);
  updateBar();
}
function updateBar(){
  const n=CART.reduce((a,r)=>a+r.qty,0);
  const t=CART.reduce((a,r)=>a+r.qty*r.price,0);
  $("cartbar").style.display=CART.length?"flex":"none";
  $("cbCount").textContent=`訂購清單：${n} 件・${fmt(t)}`;
}
let backTo="s2a";
function openCart(){
  backTo = ALL.find(x=>!$(x).classList.contains("hidden"))||"s2a";
  renderCart(); setStep(4); show(["s4"]);
}
function backFromCart(){ if(backTo==="s4")backTo="s2a"; show([backTo]); setStep(backTo==="s3"?3:(backTo.startsWith("s1")?1:2)); }
function renderCart(){
  if(!CART.length){ $("cartRows").innerHTML='<div class="empty">清單是空的，返回查詢並加入配件。</div>'; $("cartTotal").innerHTML=""; return; }
  $("cartRows").innerHTML=CART.map((r,i)=>`
    <div class="crow">
      ${IMGS[r.ik]?'<img class="cimg" src="'+IMGS[r.ik]+'" alt="">':''}
      <div class="cbody">
      <div class="t"><span>${esc(r.item)}</span><span>${fmt(r.price)}</span></div>
      <div class="m">${esc(r.proc)}・${esc(r.ear)}${r.sub?"・"+esc(r.sub):""}${r.w?"・保固 "+esc(r.w):""}<br>料號 <b style="color:var(--navy)">${esc(r.code)}</b></div>
      <div class="b">
        <span><button class="qbtn" onclick="cartQty(${i},-1)">−</button>
        <span class="qnum">${r.qty}</span>
        <button class="qbtn" onclick="cartQty(${i},1)">＋</button></span>
        <span class="sub">小計 ${fmt(r.qty*r.price)}</span>
        <button class="del" onclick="delRow(${i})">刪除</button>
      </div>
      </div>
    </div>`).join("");
  const n=CART.reduce((a,r)=>a+r.qty,0), t=CART.reduce((a,r)=>a+r.qty*r.price,0);
  $("cartTotal").innerHTML=`<span class="tt">共 ${n} 件（標準價合計，實際以報價單為準）</span><span class="tv">${fmt(t)}</span>`;
}
function cartQty(i,d){ CART[i].qty=Math.max(1,CART[i].qty+d); renderCart(); updateBar(); }
function delRow(i){ CART.splice(i,1); renderCart(); updateBar(); }
function clearCart(){ if(confirm("確定清空整份訂購清單？")){CART=[]; renderCart(); updateBar();} }
function printList(){
  if(!CART.length){alert("清單是空的。");return;}
  const now=new Date();
  const ts=now.getFullYear()+"/"+(now.getMonth()+1)+"/"+now.getDate();
  const patient=(earL?("左耳 "+earL.name):"")+(earR?((earL?"／":"")+"右耳 "+earR.name):"");
  const total=CART.reduce((a,r)=>a+r.qty*r.price,0);
  const rows=CART.map(r=>`<tr>
    <td style="text-align:center">${IMGS[r.ik]?'<img src="'+IMGS[r.ik]+'" style="width:52px;height:52px;object-fit:contain">':'—'}</td>
    <td>${esc(r.item)}<br><small>${esc(r.proc)}・${esc(r.ear)}${r.sub?"・"+esc(r.sub):""}</small></td>
    <td><b>${esc(r.code)}</b></td><td style="text-align:center">${r.w?esc(r.w):"—"}</td>
    <td style="text-align:right">${fmt(r.price)}</td><td style="text-align:center">${r.qty}</td>
    <td style="text-align:right">${fmt(r.price*r.qty)}</td></tr>`).join("");
  const w=window.open("","_blank");
  w.document.write(`<html><head><title>CI 配件訂購清單</title><style>
    body{font-family:"Microsoft JhengHei",sans-serif;padding:24px;color:#26272B}
    h2{color:#1F2A44;margin-bottom:6px} table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
    th,td{border:1px solid #ccc;padding:6px 8px;vertical-align:middle}
    th{background:#1F2A44;color:#fff;font-size:12.5px} small{color:#777}
    .tot{text-align:right;font-size:15px;font-weight:700;margin-top:10px}
    .note{font-size:11px;color:#777;margin-top:6px}</style></head><body>
    <h2>CLINICO 電子耳配件訂購清單</h2>
    <div style="font-size:13px">列印日期：${ts}　患者主機：${esc(patient)}</div>
    <table><tr><th>產品圖</th><th>品項</th><th>料號</th><th>保固</th><th>單價</th><th>數量</th><th>小計</th></tr>${rows}</table>
    <div class="tot">合計 ${fmt(total)}</div>
    <div class="note">＊價格為 2024.11 型錄標價，實際金額以報價單為準；保固依型錄標示，未標示者依出貨規定。</div>
    </body></html>`);
  w.document.close();
  setTimeout(()=>{w.focus();w.print();},400);
}
function exportOrder(){
  if(!CART.length){alert("清單是空的。");return;}
  const now=new Date();
  const ts=now.getFullYear()+"/"+(now.getMonth()+1)+"/"+now.getDate()+" "+now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");
  const dstr=now.getFullYear()+String(now.getMonth()+1).padStart(2,"0")+String(now.getDate()).padStart(2,"0");
  const patient=(earL?("左耳 "+earL.name):"")+(earR?((earL?"／":"")+"右耳 "+earR.name):"");
  const rows=CART.map(r=>[r.proc,r.ear,r.item,r.code,r.sub||"",r.w||"—",r.price,r.qty,r.price*r.qty]);
  const total=CART.reduce((a,r)=>a+r.qty*r.price,0);
  const aoa=[["CLINICO 電子耳配件訂購清單"],["匯出時間",ts],["患者主機",patient],
    ["＊價格為 2024.11 型錄標價，實際金額以報價單為準"],[],
    ["主機","耳別","品項","料號","規格","保固","單價","數量","小計"],...rows,[],
    ["","","","","","","合計","",total]];
  if(typeof XLSX!=="undefined"){
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws["!cols"]=[{wch:11},{wch:8},{wch:26},{wch:15},{wch:12},{wch:10},{wch:9},{wch:6},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,"訂購清單");
    XLSX.writeFile(wb,"CI配件訂購清單_"+dstr+".xlsx");
  }else{
    const csv="\uFEFF"+aoa.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download="CI配件訂購清單_"+dstr+".csv"; a.click();
    alert("目前環境無法載入 Excel 元件，已改匯出 CSV 檔（Excel 可直接開啟）。");
  }
}
function resetAll(){earL=earR=earPick=cat=null;setStep(1);show(["s1L"]);}
$("again").onclick=()=>{
  setStep(2);
  const bothDiff=earL&&earR&&earL.id!=="none"&&earR.id!=="none"&&earL.id!==earR.id;
  if(bothDiff){earPick=null;$("chipEars0").innerHTML=earChips();}
  show([bothDiff?"s2ear":"s2a"]);
};
$("restart").onclick=()=>{ if(!CART.length||confirm("重新開始會保留訂購清單，只重選主機。繼續？")) resetAll(); };
updateBar();
</script>
</body>
</html>
